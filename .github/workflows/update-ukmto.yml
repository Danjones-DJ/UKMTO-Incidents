name: Update UKMTO tracker

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      GSHEET_AUTH_JSON: ${{ secrets.GSHEET_AUTH_JSON }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            google-chrome-stable \
            libudunits2-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages("pacman", repos = "https://cloud.r-project.org")'
          Rscript -e 'pacman::p_load(RSelenium, rvest, tidyverse, stringr, netstat, lubridate, maps, rnaturalearth, sf, tidygeocoder, geosphere, googlesheets4, googledrive)'

      - name: Run tracker
        run: xvfb-run -a Rscript run_all.R
